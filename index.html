<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تجربة منيو ذكي</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; color: #222; }

  .top-bar {
    background: #1a1a2e; color: white;
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .top-bar h1 { font-size: 1.2rem; }
  .top-bar span { font-size: 0.8rem; color: #aaa; }

  /* API KEY INPUT */
  .api-section {
    background: #fff3cd; border-bottom: 2px solid #ffc107;
    padding: 12px 20px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .api-section label { font-size: 0.85rem; font-weight: bold; color: #856404; }
  .api-section input {
    flex: 1; min-width: 200px;
    padding: 8px 12px; border: 1px solid #ffc107; border-radius: 8px;
    font-size: 0.85rem; direction: ltr;
  }
  .api-section button {
    background: #ffc107; border: none; padding: 8px 16px;
    border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.85rem;
  }
  .api-status { font-size: 0.8rem; color: #856404; width: 100%; }

  /* MENU */
  .menu-section { padding: 16px; max-width: 700px; margin: 0 auto; }
  .menu-section h2 { font-size: 1rem; color: #555; margin-bottom: 12px; }

  .menu-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 20px;
  }

  .menu-item {
    background: white; border-radius: 12px;
    padding: 14px; border: 2px solid transparent;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 10px;
  }
  .menu-item:hover { border-color: #1a1a2e; }
  .menu-item.selected { border-color: #1a1a2e; background: #eef; }
  .menu-item .emoji { font-size: 2rem; }
  .menu-item .info { flex: 1; }
  .menu-item .name { font-weight: bold; font-size: 0.9rem; }
  .menu-item .price { color: #e74c3c; font-size: 0.85rem; margin-top: 2px; }

  /* CART */
  .cart-section {
    background: white; border-radius: 12px;
    padding: 14px; margin-bottom: 16px;
    border: 1px solid #ddd;
  }
  .cart-section h3 { font-size: 0.95rem; margin-bottom: 10px; color: #333; }
  .cart-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem;
  }
  .cart-item:last-child { border-bottom: none; }
  .cart-total { font-weight: bold; color: #e74c3c; margin-top: 8px; text-align: left; }
  .empty-cart { color: #aaa; font-size: 0.85rem; text-align: center; padding: 10px; }

  /* AI CHAT */
  .chat-section {
    background: white; border-radius: 12px;
    padding: 14px; margin-bottom: 16px;
    border: 1px solid #ddd;
  }
  .chat-section h3 { font-size: 0.95rem; margin-bottom: 10px; color: #333; }
  .chat-messages {
    height: 200px; overflow-y: auto;
    border: 1px solid #eee; border-radius: 8px;
    padding: 10px; margin-bottom: 10px;
    background: #fafafa;
  }
  .msg { margin-bottom: 8px; font-size: 0.85rem; line-height: 1.5; }
  .msg.bot { color: #1a1a2e; }
  .msg.bot strong { color: #1a1a2e; }
  .msg.user { color: #e74c3c; text-align: left; }
  .msg.user strong { color: #e74c3c; }
  .msg.system { color: #888; font-style: italic; text-align: center; font-size: 0.78rem; }

  /* VOICE BUTTON */
  .voice-area { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .voice-btn {
    flex: 1; padding: 12px;
    background: #1a1a2e; color: white;
    border: none; border-radius: 10px;
    font-size: 1rem; cursor: pointer;
    transition: all 0.2s; min-width: 140px;
  }
  .voice-btn:hover { background: #2d2d5e; }
  .voice-btn.listening { background: #e74c3c; animation: pulse 1s infinite; }
  .voice-btn:disabled { background: #aaa; cursor: not-allowed; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

  .text-input-area { display: flex; gap: 8px; margin-top: 8px; }
  .text-input-area input {
    flex: 1; padding: 10px 12px;
    border: 1px solid #ddd; border-radius: 8px; font-size: 0.85rem;
  }
  .text-input-area button {
    background: #27ae60; color: white; border: none;
    padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
  }

  .send-order-btn {
    width: 100%; padding: 14px;
    background: #27ae60; color: white;
    border: none; border-radius: 10px;
    font-size: 1rem; font-weight: bold; cursor: pointer;
    margin-top: 8px;
  }
  .send-order-btn:disabled { background: #aaa; cursor: not-allowed; }

  .clear-btn {
    width: 100%; padding: 10px;
    background: transparent; color: #e74c3c;
    border: 1px solid #e74c3c; border-radius: 10px;
    font-size: 0.85rem; cursor: pointer; margin-top: 6px;
  }

  .status-bar {
    text-align: center; padding: 8px;
    font-size: 0.8rem; color: #888;
    background: #f9f9f9; border-radius: 8px; margin-top: 8px;
  }
  .status-bar.error { color: #e74c3c; background: #ffeaea; }
  .status-bar.success { color: #27ae60; background: #eafaf1; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>🍽️ منيو تجريبي ذكي</h1>
  <span>اختبار الذكاء الاصطناعي</span>
</div>

<!-- API KEY -->
<div class="api-section">
  <label>🔑 مفتاح OpenAI:</label>
  <input type="password" id="apiKey" placeholder="sk-..." />
  <button onclick="saveKey()">حفظ</button>
  <div class="api-status" id="apiStatus">أدخل المفتاح للبدء</div>
</div>

<!-- Audio Unlock Banner -->
<div id="audioBanner" style="
  position:fixed; bottom:0; left:0; right:0; z-index:999;
  background: linear-gradient(135deg, #1a1a2e, #2d2d5e);
  padding: 16px 20px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
">
  <div style="color:white">
    <div style="font-weight:bold;font-size:0.95rem">🔊 تفعيل الصوت</div>
    <div style="font-size:0.78rem;color:#aaa;margin-top:2px">اضغط مرة واحدة فقط لسماع المساعد</div>
  </div>
  <button onclick="unlockAudio()" style="
    background: linear-gradient(135deg, #f0c040, #e0a020);
    color: #1a1a2e; border: none;
    padding: 12px 24px; border-radius: 100px;
    font-weight: bold; font-size: 0.95rem; cursor: pointer;
    white-space: nowrap;
  ">تفعيل ▶</button>
</div>

<div class="menu-section">

  <!-- MENU ITEMS -->
  <h2>📋 القائمة — اضغط لإضافة يدوياً أو اطلب بالصوت</h2>
  <div class="menu-grid" id="menuGrid"></div>

  <!-- CART -->
  <div class="cart-section">
    <h3>🛒 طلبك الحالي</h3>
    <div id="cartItems"><div class="empty-cart">لا يوجد طلبات بعد</div></div>
    <div class="cart-total" id="cartTotal"></div>
    <button class="send-order-btn" id="sendBtn" disabled onclick="sendOrder()">✅ إرسال الطلب للكاشير</button>
    <button class="clear-btn" onclick="clearCart()">🗑️ مسح الطلب</button>
  </div>

  <!-- AI CHAT -->
  <div class="chat-section">
    <h3>🤖 المساعد الذكي — تحدث أو اكتب طلبك</h3>
    <div class="chat-messages" id="chatMessages">
      <div class="msg system">ابدأ بالضغط على زر الصوت أو اكتب طلبك</div>
    </div>

    <div style="margin-bottom:10px;font-size:0.8rem;color:#888">🔊 صوت المساعد: عربي تلقائي</div>

    <div class="voice-area">
      <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
        🎙️ اضغط وتكلم
      </button>
    </div>

    <div class="text-input-area">
      <input type="text" id="textInput" placeholder="أو اكتب طلبك هنا..." onkeydown="if(event.key==='Enter')sendText()" />
      <button onclick="sendText()">إرسال</button>
    </div>

    <div class="status-bar" id="statusBar">جاهز</div>
  </div>

</div>

<script>
// ─── MENU DATA ───────────────────────────────────────────────
const menuItems = [
  { id: 1, emoji: '🍔', name: 'برغر كبير',     price: 12000 },
  { id: 2, emoji: '🍔', name: 'برغر صغير',     price: 8000  },
  { id: 3, emoji: '🍕', name: 'بيتزا مارغريتا', price: 15000 },
  { id: 4, emoji: '🍟', name: 'بطاطا مقلية',   price: 5000  },
  { id: 5, emoji: '🥤', name: 'كولا',           price: 3000  },
  { id: 6, emoji: '🧃', name: 'عصير برتقال',   price: 4000  },
  { id: 7, emoji: '🍗', name: 'دجاج مشوي',     price: 18000 },
  { id: 8, emoji: '🍮', name: 'كريم كراميل',   price: 6000  },
];

let cart = {};
let apiKey = '';
let chatHistory = [];
let recognition = null;
let isListening = false;

// ─── RENDER MENU ─────────────────────────────────────────────
function renderMenu() {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = menuItems.map(item => `
    <div class="menu-item" onclick="addToCartManual(${item.id})" id="mi-${item.id}">
      <span class="emoji">${item.emoji}</span>
      <div class="info">
        <div class="name">${item.name}</div>
        <div class="price">${item.price.toLocaleString()} د.ع</div>
      </div>
    </div>
  `).join('');
}

function addToCartManual(id) {
  const item = menuItems.find(i => i.id === id);
  if (!item) return;
  if (!cart[id]) cart[id] = { ...item, qty: 0 };
  cart[id].qty++;
  renderCart();
}

// ─── CART ─────────────────────────────────────────────────────
function addToCartFromAI(name, qty = 1, note = '') {
  const normalize = s => s.replace(/\s+/g, '').replace(/[اأإآ]/g, 'ا').replace(/[ةه]/g, 'ه');
  const n = normalize(name);
  const item = menuItems.find(i => {
    const iName = normalize(i.name);
    return iName.includes(n) || n.includes(iName) ||
           iName.split('').filter(c => n.includes(c)).length > iName.length * 0.6;
  });
  if (!item) return false;
  if (!cart[item.id]) cart[item.id] = { ...item, qty: 0, note: '' };
  cart[item.id].qty += qty;
  if (note) cart[item.id].note = note;
  renderCart();
  return true;
}

function renderCart() {
  const items = Object.values(cart).filter(i => i.qty > 0);
  const container = document.getElementById('cartItems');
  const totalEl = document.getElementById('cartTotal');
  const sendBtn = document.getElementById('sendBtn');

  if (items.length === 0) {
    container.innerHTML = '<div class="empty-cart">لا يوجد طلبات بعد</div>';
    totalEl.textContent = '';
    sendBtn.disabled = true;
    return;
  }

  container.innerHTML = items.map(item => `
    <div class="cart-item">
      <span>${item.emoji} ${item.name} ${item.note ? '('+item.note+')' : ''}</span>
      <span>
        <button onclick="changeQty(${item.id},-1)" style="background:none;border:1px solid #ddd;border-radius:4px;padding:0 6px;cursor:pointer">−</button>
        ${item.qty}
        <button onclick="changeQty(${item.id},1)" style="background:none;border:1px solid #ddd;border-radius:4px;padding:0 6px;cursor:pointer">+</button>
      </span>
      <span style="color:#e74c3c">${(item.qty * item.price).toLocaleString()} د.ع</span>
    </div>
  `).join('');

  const total = items.reduce((s, i) => s + i.qty * i.price, 0);
  totalEl.textContent = 'المجموع: ' + total.toLocaleString() + ' د.ع';
  sendBtn.disabled = false;
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  renderCart();
}

function clearCart() {
  cart = {};
  renderCart();
}

function sendOrder() {
  const items = Object.values(cart).filter(i => i.qty > 0);
  if (items.length === 0) return;
  const summary = items.map(i => `${i.qty}x ${i.name}`).join('، ');
  addMessage('system', '✅ تم إرسال الطلب للكاشير: ' + summary);
  setStatus('تم إرسال الطلب بنجاح!', 'success');
  clearCart();
  chatHistory = [];
}

// ─── API KEY ──────────────────────────────────────────────────
function saveKey() {
  apiKey = document.getElementById('apiKey').value.trim();
  if (apiKey.startsWith('sk-')) {
    document.getElementById('apiStatus').textContent = '✅ المفتاح محفوظ، يمكنك البدء';
    addMessage('bot', 'مرحباً! أنا مساعدك الذكي. قل لي ماذا تريد أن تطلب وسأساعدك.');
    initChat();
  } else {
    document.getElementById('apiStatus').textContent = '❌ المفتاح غير صحيح';
  }
}

// ─── CHAT WITH AI ─────────────────────────────────────────────
function buildMenuText() {
  return menuItems.map(i => `- ${i.name}: ${i.price.toLocaleString()} دينار`).join('\n');
}

function initChat() {
  chatHistory = [{
    role: 'system',
    content: `أنت مساعد طلبات مطعم ذكي وودود. تتحدث العربية فقط. ردودك قصيرة وطبيعية.

القائمة المتاحة:
${buildMenuText()}

قواعد فهم الطلب:
- كن ذكياً في فهم ما يقوله الزبون، حتى لو قال كلمة مختصرة أو مختلفة قليلاً عن اسم الصنف
- أمثلة: "كريم" أو "كراميل" = كريم كراميل، "برقر" أو "همبرغر" = برغر، "بيتزا" = بيتزا مارغريتا إذا ما في غيرها
- لو في أكثر من صنف مشابه اسأل الزبون يوضح
- لو الزلبون قال شيء ما له علاقة بأي صنف بالقائمة قل "ما عندنا هذا، شو غيره؟"

قواعد المحادثة:
- ردودك قصيرة جداً لا تتجاوز جملتين
- لو سألك عن القائمة قل الفئات فقط باختصار بدون أسعار
- لو طلب صنف واضح اسأل عن الكمية فقط
- بعد ما تفهم الطلب كاملاً أكده بجملة واحدة قصيرة
- لما يؤكد أرجع هذا فقط: تم_الطلب: اسم_الصنف×الكمية، اسم_الصنف×الكمية
- لو الزبون حكى شيء خارج الموضوع رد بجملة واحدة وارجع للطلب`
  }];
}

async function sendToAI(userMessage) {
  if (!apiKey) {
    setStatus('أدخل المفتاح أولاً', 'error');
    return;
  }

  chatHistory.push({ role: 'user', content: userMessage });
  setStatus('جاري التفكير...', '');

  try {
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: chatHistory,
        max_tokens: 300,
        temperature: 0.3
      })
    });

    const data = await response.json();

    if (data.error) {
      setStatus('خطأ: ' + data.error.message, 'error');
      return;
    }

    const reply = data.choices[0].message.content;
    chatHistory.push({ role: 'assistant', content: reply });

    // Speak the reply
    speakText(reply.replace(/تم_الطلب:[^\n]*/,'').trim() || reply);

    // Check if order confirmed
    if (reply.includes('تم_الطلب:')) {
      const orderPart = reply.split('تم_الطلب:')[1].split('\n')[0].trim();
      const cleanReply = reply.replace(/تم_الطلب:[^\n]*/,'').trim();
      if (cleanReply) addMessage('bot', cleanReply);

      // Parse items
      let addedCount = 0;
      orderPart.split('،').forEach(part => {
        const [name, qtyStr] = part.trim().split('×');
        const qty = parseInt(qtyStr) || 1;
        if (addToCartFromAI(name.trim(), qty)) addedCount++;
      });

      if (addedCount > 0) {
        addMessage('system', '✅ تمت إضافة الطلب للسلة تلقائياً');
        setStatus('تم إضافة الطلب للسلة', 'success');
      }
    } else {
      addMessage('bot', reply);
      setStatus('جاهز', '');
    }

  } catch (err) {
    setStatus('خطأ في الاتصال: ' + err.message, 'error');
  }
}

// ─── MESSAGES ─────────────────────────────────────────────────
function addMessage(type, text) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  const label = type === 'bot' ? '<strong>🤖 المساعد:</strong> ' :
                type === 'user' ? '<strong>👤 أنت:</strong> ' : '';
  div.innerHTML = label + text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function setStatus(msg, type) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar ' + (type || '');
}

// ─── TEXT INPUT ───────────────────────────────────────────────
function sendText() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage('user', text);
  sendToAI(text);
}

// ─── AUDIO UNLOCK (Mobile) ────────────────────────────────────
let audioUnlocked = false;

function unlockAudio() {
  audioUnlocked = true;
  sessionStorage.setItem('audioUnlocked', '1');
  const banner = document.getElementById('audioBanner');
  banner.style.background = 'linear-gradient(135deg, #1a6b3a, #27ae60)';
  banner.innerHTML = `
    <div style="color:white;display:flex;align-items:center;gap:10px;width:100%;justify-content:center">
      <span style="font-size:1.2rem">✅</span>
      <span style="font-weight:bold">الصوت مفعّل</span>
    </div>
  `;
  setTimeout(() => {
    banner.style.transition = 'opacity 0.5s';
    banner.style.opacity = '0';
    setTimeout(() => banner.style.display = 'none', 500);
  }, 1500);
}

// ─── TEXT TO SPEECH (Browser - Free) ─────────────────────────
function speakText(text) {
  if (!window.speechSynthesis || !text.trim() || !audioUnlocked) return;
  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ar-SA';
  utter.rate = 0.9;
  utter.pitch = 1;

  const voices = window.speechSynthesis.getVoices();
  const arVoice = voices.find(v => v.lang === 'ar-SA') ||
                  voices.find(v => v.lang === 'ar-EG') ||
                  voices.find(v => v.lang.startsWith('ar'));
  if (arVoice) utter.voice = arVoice;

  window.speechSynthesis.speak(utter);
}

window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

// ─── VOICE ────────────────────────────────────────────────────
function toggleVoice() {
  if (isListening) { stopVoice(); return; }
  startVoice();
}

function startVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    setStatus('المتصفح لا يدعم الصوت، استخدم Chrome', 'error');
    return;
  }
  if (!apiKey) { setStatus('أدخل المفتاح أولاً', 'error'); return; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ar-SA';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('voiceBtn').textContent = '🔴 جاري الاستماع... (اضغط للإيقاف)';
    document.getElementById('voiceBtn').classList.add('listening');
    setStatus('🎙️ أنا أسمعك...', '');
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    addMessage('user', text);
    sendToAI(text);
  };

  recognition.onerror = (e) => {
    setStatus('خطأ بالصوت: ' + e.error, 'error');
    stopVoice();
  };

  recognition.onend = () => stopVoice();
  recognition.start();
}

function stopVoice() {
  isListening = false;
  if (recognition) recognition.stop();
  document.getElementById('voiceBtn').textContent = '🎙️ اضغط وتكلم';
  document.getElementById('voiceBtn').classList.remove('listening');
  setStatus('جاهز', '');
}

// ─── INIT ─────────────────────────────────────────────────────
renderMenu();
renderCart();

// Hide banner if already unlocked in this session
if (sessionStorage.getItem('audioUnlocked')) {
  audioUnlocked = true;
  document.getElementById('audioBanner').style.display = 'none';
}
</script>
</body>
</html>
